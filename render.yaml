services:
  - type: web
    name: balance-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/render-server.mjs
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
